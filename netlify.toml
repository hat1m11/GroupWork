[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# NEXT_PUBLIC_SUPABASE_ANON_KEY is intentionally embedded in the client
# bundle by Next.js — it is a public, read-only API key by design.
# The service_role key (which IS secret) never appears in build output.
[context.production.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL"
